data:
  train_data: /path/to/asr_train.jsonl
  max_audio_seconds: 30
  train_max_samples: -1
  shuffle: true

adapters:
  student: your_package.adapters:build_student
  teacher: your_package.adapters:build_teacher
  options:
    student:
      model_name_or_path: /path/to/student
    teacher:
      model_name_or_path: /path/to/teacher

training:
  output_dir: runs/asr_opd_single_node
  seed: 1
  max_steps: 1000
  per_device_train_batch_size: 1
  learning_rate: 0.00001
  opd_top_k: 32
  opd_temperature: 1.0
  max_new_tokens: 64
  device: cuda
